<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Admin Panel — musfiqurrabeg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0a0a0c;
      --surface:  #111114;
      --card:     #18181c;
      --border:   #282830;
      --border-hi:#38383f;
      --text:     #f0f0f2;
      --muted:    #888894;
      --muted-2:  #55555f;
      --accent:   #ffdb70;
      --accent-d: #ffdb7018;
      --danger:   #ff4d4d;
      --success:  #4ade80;
      --radius:   14px;
      --ease:     0.2s ease;
      --font-b:   'Plus Jakarta Sans', sans-serif;
      --font-d:   'Outfit', sans-serif;
      --font-m:   'Fira Code', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-b); font-size: 14px; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    button { border: none; background: none; cursor: pointer; font-family: inherit; }
    input, textarea, select { font-family: inherit; }
    ul { list-style: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }

    /* LOGIN */
    .login-screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); z-index: 999;
      transition: opacity 0.3s ease;
    }
    .login-screen.hidden { opacity: 0; pointer-events: none; }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%; max-width: 380px;
    }
    .login-logo {
      font-family: var(--font-d);
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .login-sub {
      font-family: var(--font-m);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-2);
      margin-bottom: 28px;
    }
    .login-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .login-field label { font-family: var(--font-m); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted-2); }
    .login-field input {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 14px;
      color: var(--text); font-size: 14px; outline: none;
      transition: border-color var(--ease);
    }
    .login-field input:focus { border-color: var(--accent); }
    .login-err { font-family: var(--font-m); font-size: 11px; color: var(--danger); margin-bottom: 10px; min-height: 14px; }
    .login-btn {
      width: 100%; padding: 12px;
      background: var(--accent); color: #0a0a0c;
      border-radius: 100px;
      font-family: var(--font-d); font-size: 14px; font-weight: 700;
      transition: opacity var(--ease);
    }
    .login-btn:hover { opacity: 0.88; }

    /* LAYOUT */
    .admin-layout { display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .admin-sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 24px 16px;
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
    }
    .admin-logo {
      font-family: var(--font-d);
      font-size: 16px; font-weight: 800;
      color: var(--accent); margin-bottom: 4px;
    }
    .admin-logo-sub {
      font-family: var(--font-m); font-size: 9px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted-2); margin-bottom: 28px;
    }
    .admin-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .admin-nav-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      font-size: 13px; color: var(--muted);
      transition: color var(--ease), background var(--ease);
      text-align: left; width: 100%;
    }
    .admin-nav-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .admin-nav-btn:hover { color: var(--text); background: var(--card); }
    .admin-nav-btn.active { color: var(--accent); background: var(--accent-d); }
    .admin-sidebar-footer { margin-top: auto; }
    .admin-visit-link {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 8px;
      font-size: 12px; color: var(--muted);
      border: 1px solid var(--border); margin-bottom: 8px;
      transition: color var(--ease), border-color var(--ease);
    }
    .admin-visit-link:hover { color: var(--accent); border-color: var(--accent); }
    .logout-btn {
      width: 100%; text-align: left; padding: 10px 12px;
      font-size: 12px; color: var(--danger); border-radius: 8px;
      transition: background var(--ease);
    }
    .logout-btn:hover { background: #ff4d4d15; }

    /* MAIN */
    .admin-main { flex: 1; padding: 32px 36px; max-width: 900px; }

    /* PANEL */
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }

    .admin-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap;
    }
    .admin-panel-title {
      font-family: var(--font-d); font-size: 24px; font-weight: 800;
    }
    .add-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 18px;
      background: var(--accent); color: #0a0a0c;
      border-radius: 100px;
      font-family: var(--font-d); font-size: 12px; font-weight: 700;
    }
    .add-btn:hover { opacity: 0.88; }
    .add-btn svg { width: 14px; height: 14px; }

    /* FORM CARD */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }
    .form-card-title {
      font-family: var(--font-d); font-size: 15px; font-weight: 700;
      margin-bottom: 18px; color: var(--text);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid.one { grid-template-columns: 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.span2 { grid-column: 1 / -1; }
    .form-group label {
      font-family: var(--font-m); font-size: 9.5px;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted-2);
    }
    .form-group input, .form-group textarea, .form-group select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text); font-size: 13.5px; outline: none;
      transition: border-color var(--ease);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
    .form-group select option { background: var(--surface); }
    .form-actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
    .btn-save {
      padding: 9px 20px;
      background: var(--accent); color: #0a0a0c;
      border-radius: 100px;
      font-family: var(--font-d); font-size: 12px; font-weight: 700;
    }
    .btn-save:hover { opacity: 0.88; }
    .btn-cancel {
      padding: 9px 20px;
      background: var(--card); color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 12px;
    }
    .btn-cancel:hover { color: var(--text); }
    .save-flash {
      font-family: var(--font-m); font-size: 11px; color: var(--success);
      align-self: center; opacity: 0; transition: opacity 0.2s;
    }
    .save-flash.visible { opacity: 1; }

    /* ITEMS LIST */
    .items-list { display: flex; flex-direction: column; gap: 10px; }
    .list-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
    }
    .list-item-body { flex: 1; }
    .list-item-title {
      font-family: var(--font-d); font-size: 14px; font-weight: 600;
      color: var(--text); margin-bottom: 2px;
    }
    .list-item-sub { font-size: 12px; color: var(--muted); }
    .list-item-actions { display: flex; gap: 6px; }
    .item-btn {
      padding: 6px 14px; border-radius: 100px;
      font-family: var(--font-m); font-size: 10px; letter-spacing: 0.05em;
      border: 1px solid var(--border); color: var(--muted);
      transition: all var(--ease);
    }
    .item-btn.edit:hover { color: var(--accent); border-color: var(--accent); }
    .item-btn.del  { color: var(--danger); border-color: #ff4d4d30; }
    .item-btn.del:hover { background: #ff4d4d15; border-color: var(--danger); }

    /* RANGE */
    .range-wrap { display: flex; align-items: center; gap: 12px; }
    .range-wrap input[type=range] {
      flex: 1; padding: 0; height: 4px; cursor: pointer;
      accent-color: var(--accent);
    }
    .range-val {
      font-family: var(--font-m); font-size: 12px;
      color: var(--accent); width: 36px; text-align: right;
    }

    /* RESPONSIVE */
    @media (max-width: 700px) {
      .admin-sidebar { display: none; }
      .admin-main { padding: 20px 16px; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Admin Panel</div>
    <div class="login-sub">musfiqurrabeg portfolio</div>
    <div class="login-field">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="admin" autocomplete="off" />
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••" />
    </div>
    <p class="login-err" id="loginErr"></p>
    <button class="login-btn" id="loginBtn">Login</button>
  </div>
</div>

<!-- ── ADMIN LAYOUT ── -->
<div class="admin-layout" id="adminLayout" style="display:none;">

  <aside class="admin-sidebar">
    <div class="admin-logo">Admin</div>
    <div class="admin-logo-sub">Portfolio Manager</div>

    <nav class="admin-nav">
      <button class="admin-nav-btn active" data-panel="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Profile
      </button>
      <button class="admin-nav-btn" data-panel="services">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Services
      </button>
      <button class="admin-nav-btn" data-panel="experience">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
        Experience
      </button>
      <button class="admin-nav-btn" data-panel="education">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        Education
      </button>
      <button class="admin-nav-btn" data-panel="skills">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Skills
      </button>
      <button class="admin-nav-btn" data-panel="projects">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        Projects
      </button>
    </nav>

    <div class="admin-sidebar-footer">
      <a class="admin-visit-link" href="index.html" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        View Portfolio
      </a>
      <button class="logout-btn" id="logoutBtn">← Log out</button>
    </div>
  </aside>

  <main class="admin-main">

    <!-- ── PROFILE PANEL ── -->
    <div class="admin-panel active" id="panel-profile">
      <div class="admin-panel-header">
        <h2 class="admin-panel-title">Profile</h2>
      </div>
      <div class="form-card">
        <div class="form-grid">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="pName" />
          </div>
          <div class="form-group">
            <label>Role / Tagline</label>
            <input type="text" id="pRole" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="pEmail" />
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="text" id="pPhone" />
          </div>
          <div class="form-group">
            <label>Location</label>
            <input type="text" id="pLocation" />
          </div>
          <div class="form-group">
            <label>GitHub URL</label>
            <input type="url" id="pGithub" />
          </div>
          <div class="form-group">
            <label>LinkedIn URL</label>
            <input type="url" id="pLinkedin" />
          </div>
          <div class="form-group">
            <label>Upwork URL</label>
            <input type="url" id="pUpwork" />
          </div>
          <div class="form-group">
            <label>Twitter/X URL</label>
            <input type="url" id="pTwitter" />
          </div>
          <div class="form-group">
            <label>Facebook URL</label>
            <input type="url" id="pFacebook" />
          </div>
          <div class="form-group">
            <label>Instagram URL</label>
            <input type="url" id="pInstagram" />
          </div>
          <div class="form-group">
            <label>Avatar Image URL</label>
            <input type="url" id="pAvatar" placeholder="https://..." />
          </div>
          <div class="form-group span2">
            <label>Bio</label>
            <textarea id="pBio" rows="4"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-save" id="saveProfile">Save Profile</button>
          <span class="save-flash" id="profileFlash">✓ Saved!</span>
        </div>
      </div>
    </div>

    <!-- ── SERVICES PANEL ── -->
    <div class="admin-panel" id="panel-services">
      <div class="admin-panel-header">
        <h2 class="admin-panel-title">Services</h2>
        <button class="add-btn" id="addServiceBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Service
        </button>
      </div>
      <div class="form-card" id="serviceForm" style="display:none;">
        <div class="form-card-title" id="serviceFormTitle">New Service</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Icon (emoji)</label>
            <input type="text" id="sIcon" placeholder="⚡" maxlength="4" />
          </div>
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="sTitle" />
          </div>
          <div class="form-group span2">
            <label>Description</label>
            <textarea id="sDesc" rows="2"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-save" id="saveService">Save</button>
          <button class="btn-cancel" id="cancelService">Cancel</button>
          <span class="save-flash" id="serviceFlash">✓ Saved!</span>
        </div>
      </div>
      <div class="items-list" id="servicesList"></div>
    </div>

    <!-- ── EXPERIENCE PANEL ── -->
    <div class="admin-panel" id="panel-experience">
      <div class="admin-panel-header">
        <h2 class="admin-panel-title">Experience</h2>
        <button class="add-btn" id="addExpBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add
        </button>
      </div>
      <div class="form-card" id="expForm" style="display:none;">
        <div class="form-card-title" id="expFormTitle">New Experience</div>
        <div class="form-grid">
          <div class="form-group"><label>Period</label><input type="text" id="eperiod" placeholder="2024 — Present" /></div>
          <div class="form-group"><label>Title</label><input type="text" id="etitle" /></div>
          <div class="form-group"><label>Organisation</label><input type="text" id="eorg" /></div>
          <div class="form-group span2"><label>Description</label><textarea id="edesc" rows="2"></textarea></div>
        </div>
        <div class="form-actions">
          <button class="btn-save" id="saveExp">Save</button>
          <button class="btn-cancel" id="cancelExp">Cancel</button>
          <span class="save-flash" id="expFlash">✓ Saved!</span>
        </div>
      </div>
      <div class="items-list" id="experienceList"></div>
    </div>

    <!-- ── EDUCATION PANEL ── -->
    <div class="admin-panel" id="panel-education">
      <div class="admin-panel-header">
        <h2 class="admin-panel-title">Education</h2>
        <button class="add-btn" id="addEduBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add
        </button>
      </div>
      <div class="form-card" id="eduForm" style="display:none;">
        <div class="form-card-title" id="eduFormTitle">New Education</div>
        <div class="form-grid">
          <div class="form-group"><label>Period</label><input type="text" id="eduPeriod" placeholder="2022 — Present" /></div>
          <div class="form-group"><label>Degree / Title</label><input type="text" id="eduTitle" /></div>
          <div class="form-group"><label>Institution</label><input type="text" id="eduOrg" /></div>
          <div class="form-group span2"><label>Description</label><textarea id="eduDesc" rows="2"></textarea></div>
        </div>
        <div class="form-actions">
          <button class="btn-save" id="saveEdu">Save</button>
          <button class="btn-cancel" id="cancelEdu">Cancel</button>
          <span class="save-flash" id="eduFlash">✓ Saved!</span>
        </div>
      </div>
      <div class="items-list" id="educationList"></div>
    </div>

    <!-- ── SKILLS PANEL ── -->
    <div class="admin-panel" id="panel-skills">
      <div class="admin-panel-header">
        <h2 class="admin-panel-title">Skills</h2>
        <button class="add-btn" id="addSkillBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add
        </button>
      </div>
      <div class="form-card" id="skillForm" style="display:none;">
        <div class="form-card-title" id="skillFormTitle">New Skill</div>
        <div class="form-grid">
          <div class="form-group span2"><label>Skill Name</label><input type="text" id="skName" /></div>
          <div class="form-group span2">
            <label>Proficiency</label>
            <div class="range-wrap">
              <input type="range" id="skPct" min="0" max="100" value="75" />
              <span class="range-val" id="skPctVal">75%</span>
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-save" id="saveSkill">Save</button>
          <button class="btn-cancel" id="cancelSkill">Cancel</button>
          <span class="save-flash" id="skillFlash">✓ Saved!</span>
        </div>
      </div>
      <div class="items-list" id="skillsList"></div>
    </div>

    <!-- ── PROJECTS PANEL ── -->
    <div class="admin-panel" id="panel-projects">
      <div class="admin-panel-header">
        <h2 class="admin-panel-title">Projects</h2>
        <button class="add-btn" id="addProjBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Project
        </button>
      </div>
      <div class="form-card" id="projForm" style="display:none;">
        <div class="form-card-title" id="projFormTitle">New Project</div>
        <div class="form-grid">
          <div class="form-group"><label>Title</label><input type="text" id="prTitle" /></div>
          <div class="form-group"><label>Year</label><input type="text" id="prYear" placeholder="2024" /></div>
          <div class="form-group"><label>Thumbnail Emoji (fallback)</label><input type="text" id="prEmoji" placeholder="🚀" maxlength="4" /></div>
          <div class="form-group span2"><label>Project Image URL</label><input type="url" id="prThumb" placeholder="Paste image URL (e.g. from Imgur, GitHub, etc.)" /></div>
          <div class="form-group span2"><label>Short Excerpt</label><input type="text" id="prExcerpt" /></div>
          <div class="form-group span2"><label>Full Description</label><textarea id="prDesc" rows="3"></textarea></div>
          <div class="form-group span2"><label>Tech Tags (comma separated)</label><input type="text" id="prTags" placeholder="React, Node.js, PostgreSQL" /></div>
          <div class="form-group span2"><label>Live URL</label><input type="url" id="prUrl" placeholder="https://..." /></div>
        </div>
        <div class="form-actions">
          <button class="btn-save" id="saveProj">Save</button>
          <button class="btn-cancel" id="cancelProj">Cancel</button>
          <span class="save-flash" id="projFlash">✓ Saved!</span>
        </div>
      </div>
      <div class="items-list" id="projectsList"></div>
    </div>

  </main>
</div>
